services:
  postgres-db:
    image: postgres:16-alpine
    container_name: restaurant_postgres_container
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: restaurant_db
      POSTGRES_USER: restaurant_admin
      POSTGRES_PASSWORD: postgres_password_demo
    volumes:
      - postgres_restaurant_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: restaurant_api_container
    ports:
      - "8080:8080"
    depends_on:
      - postgres-db
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-db:5432/restaurant_db
      SPRING_DATASOURCE_USERNAME: restaurant_admin
      SPRING_DATASOURCE_PASSWORD: postgres_password_demo
      SPRING_JPA_HIBERNATE_DDL_AUTO: update

volumes:
  postgres_restaurant_data: